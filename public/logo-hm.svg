<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Cercle de fond -->
  <circle cx="100" cy="100" r="96" fill="#0f172a" stroke="url(#bookGrad)" stroke-width="3" opacity="0.9"/>

  <!-- Étoiles décoratives -->
  <circle cx="40" cy="40" r="2" fill="#fcd34d" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="35" r="1.5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="165" cy="155" r="2" fill="#fcd34d" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="155" r="1.5" fill="#a78bfa" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Livre ouvert (pages) -->
  <!-- Page gauche -->
  <path d="M100 135 L100 60 Q100 50 85 52 L55 58 Q40 60 40 75 L40 140 Q40 150 55 148 L85 142 Q100 140 100 135Z" fill="url(#pageGrad)" opacity="0.95"/>

  <!-- Page droite -->
  <path d="M100 135 L100 60 Q100 50 115 52 L145 58 Q160 60 160 75 L160 140 Q160 150 145 148 L115 142 Q100 140 100 135Z" fill="url(#pageGrad)" opacity="0.9"/>

  <!-- Reliure centrale -->
  <line x1="100" y1="55" x2="100" y2="142" stroke="#d97706" stroke-width="2" opacity="0.6"/>

  <!-- Couverture du livre -->
  <path d="M100 140 L100 55 Q100 45 83 48 L50 55 C35 58 33 72 33 78 L33 145 Q33 155 50 152 L83 147 Q100 145 100 140Z" fill="url(#bookGrad)" opacity="0.3" stroke="url(#bookGrad)" stroke-width="1.5"/>

  <path d="M100 140 L100 55 Q100 45 117 48 L150 55 C165 58 167 72 167 78 L167 145 Q167 155 150 152 L117 147 Q100 145 100 140Z" fill="url(#bookGrad)" opacity="0.3" stroke="url(#bookGrad)" stroke-width="1.5"/>

  <!-- Étoile magique au-dessus du livre -->
  <g transform="translate(100, 35)">
    <path d="M0 -12 L2.5 -4 L10 -4 L4 1 L6 9 L0 4.5 L-6 9 L-4 1 L-10 -4 L-2.5 -4 Z" fill="url(#sparkleGrad)">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- Lignes de texte sur la page gauche -->
  <line x1="52" y1="78" x2="88" y2="75" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="50" y1="90" x2="86" y2="87" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="51" y1="102" x2="87" y2="99" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Lignes de texte sur la page droite -->
  <line x1="115" y1="75" x2="148" y2="78" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="116" y1="87" x2="148" y2="90" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="115" y1="99" x2="147" y2="102" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Petites étincelles autour -->
  <g opacity="0.6">
    <circle cx="68" cy="48" r="1.5" fill="#fcd34d">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="132" cy="48" r="1.5" fill="#a78bfa">
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="50" cy="120" r="1" fill="#fcd34d">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="150" cy="120" r="1" fill="#a78bfa">
      <animate attributeName="opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
  </g>
</svg>
